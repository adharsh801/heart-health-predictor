kind = "web"
previewPath = "/"
title = "Heart Disease Prediction"
version = "1.0.0"
id = "artifacts/heart-disease-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23748

[services.development]
run = "pnpm --filter @workspace/heart-disease-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/heart-disease-app", "run", "build" ]
publicDir = "artifacts/heart-disease-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23748"
BASE_PATH = "/"
